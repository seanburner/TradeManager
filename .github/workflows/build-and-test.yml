name: TradeManager Test

on: [push, pull_request]

jobs:
  tox_test:
    name: Tox test
    env:
      PIP_NO_CACHE_DIR: "1"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tox tests
        id: test
        uses: fedora-python/tox-github-action@main
        with:
          tox_env: py313,py312
