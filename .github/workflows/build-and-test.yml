name: TradeManager Test

on: [push, pull_request]

jobs:
  tox_test:
    name: Tox test
    # 💡 Set the environment variable at the job level
    env:
      PIP_NO_CACHE_DIR: "1"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository  
        uses: actions/checkout@v4
      - name: Run tox tests
        id: test
        # 💡 The action will now inherit the PIP_NO_CACHE_DIR environment variable
        uses: fedora-python/tox-github-action@main
        with:
          tox_env: py313,py312
          run: |
    		python -m pip install --upgrade pip
    		if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
