</div>






<script>
    function switchTab(event, tabId) {
        event.preventDefault();
    
        // Hide all tab content panel panels
        document.querySelectorAll('.tab-panel').forEach(panel => {
            panel.classList.replace('block', 'hidden');
        });
    
        // Deactivate styling on all tab trigger buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('border-blue-500', 'text-blue-400');
            btn.classList.add('border-transparent', 'text-gray-400');
        });
    
        // Reveal current target panel
        document.getElementById(tabId).classList.replace('hidden', 'block');
    
        // Apply active highlight styling to the clicked tab element
        event.currentTarget.classList.remove('border-transparent', 'text-gray-400');
        event.currentTarget.classList.add('border-blue-500', 'text-blue-400');
    }
    function changeProfilePix(selectedVal) {
        const input = event.target;

        const previewImg = document.getElementById('profile-preview');
        if (previewImg) {
           // Update the src attribute with the local file's data URL
            previewImg.src =selectedVal;
        }
        
    }
    
    // Async AJAX Form Processing & Toast Notification
    async function savePasswordTabForm(event, targetUrl) {
    event.preventDefault();
    const form = event.target;
    
    // Package form parameters directly as URL-encoded data matching standard POST mechanisms
    const formData = new URLSearchParams(new FormData(form));
    
    try {
        const response = await fetch(targetUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });
        
        if (response.ok) {
            // Optional: If backend returns a message JSON, you can extract it here
            showToast("Changes saved successfully!", "success");
            
            // Clear passwords if the active tab was the password window
            if(targetUrl.includes('password')) form.reset();
        } else {
            const errData = await response.json().catch(() => ({}));
            showToast(errData.detail || "Error keeping configurations.", "error");
        }
    } catch (error) {
        showToast("Network disruption. Connection timed out.", "error");
    }
    }

    function showToast(message, type = "success") {
    const toast = document.getElementById('toast-notification');
    const toastMsg = document.getElementById('toast-message');
    
    toastMsg.innerText = message;
    
    // Modify colors if error occurred
    if (type === "error") {
        toast.classList.remove('bg-green-600');
        toast.classList.add('bg-red-600');
    } else {
        toast.classList.remove('bg-red-600');
        toast.classList.add('bg-green-600');
    }
    
    // Slide Up/Fade In
    toast.classList.remove('translate-y-10', 'opacity-0');
    toast.classList.add('translate-y-0', 'opacity-100');
    
    // Hold 3 seconds, then clear slide downstream
    setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-10', 'opacity-0');
    }, 3000);
    }
</script>
{% endblock %}
